<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Blob background -->
  <path fill="#2563EB" d="M100 16C122 4 158 10 174 38C188 63 188 98 174 124C160 150 132 168 106 170C80 172 50 160 32 140C14 120 12 88 22 62C32 36 78 28 100 16Z"/>

  <!-- Small ring decorations -->
  <circle cx="46" cy="44" r="6" fill="none" stroke="#93C5FD" stroke-width="3"/>
  <circle cx="160" cy="88" r="5" fill="none" stroke="#93C5FD" stroke-width="2.5"/>
  <circle cx="128" cy="162" r="4" fill="none" stroke="#93C5FD" stroke-width="2.5"/>

  <!-- Clock outer ring -->
  <circle cx="90" cy="88" r="55" fill="#1E3A8A"/>

  <!-- Clock face -->
  <circle cx="90" cy="88" r="45" fill="#F8FAFF"/>

  <!-- Minute hand (pointing to 12) -->
  <line x1="90" y1="88" x2="90" y2="55" stroke="#EC4899" stroke-width="5" stroke-linecap="round"/>

  <!-- Hour hand (pointing to ~9, slightly down) -->
  <line x1="90" y1="88" x2="63" y2="100" stroke="#EC4899" stroke-width="5" stroke-linecap="round"/>

  <!-- Center dot -->
  <circle cx="90" cy="88" r="4.5" fill="#EC4899"/>

  <!-- Pill / Capsule (rotated ~−45°, overlapping bottom-right of clock) -->
  <g transform="translate(138,132) rotate(-45)">
    <!-- Cream left half -->
    <path d="M 0,-13 L -17,-13 Q -30,-13 -30,0 Q -30,13 -17,13 L 0,13 Z" fill="#EDE0D0"/>
    <!-- Pink right half -->
    <path d="M 0,-13 L 17,-13 Q 30,-13 30,0 Q 30,13 17,13 L 0,13 Z" fill="#EC4899"/>
    <!-- Dividing line between halves -->
    <line x1="0" y1="-13" x2="0" y2="13" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
  </g>
</svg>
